# Kafka cluster in KRaft mode (no ZooKeeper)
# Node pools enabled: replicas and storage come from KafkaNodePool (see kafka-node-pool.yaml)
apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: data-engineering-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
spec:
  kafka:
    version: 4.1.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      log.message.format.version: "4.1"
  entityOperator:
    topicOperator: {}
    userOperator: {}
