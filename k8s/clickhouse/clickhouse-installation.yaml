# ClickHouse cluster (CHI) - single node for local Kind
# Altinity operator v1: layout inside configuration.clusters[], templates under defaults
apiVersion: clickhouse.altinity.com/v1
kind: ClickHouseInstallation
metadata:
  name: analytics
  namespace: clickhouse
spec:
  defaults:
    replicasUseFQDN: "no"
    distributedDDL:
      profile: default
    storageManagement:
      provisioner: StatefulSet
      reclaimPolicy: Retain
  configuration:
    # Set a known password and allow connections from any pod (dev/Kind only)
    users:
      default/password: "default"
      default/networks/ip:
        - "::1"
        - "127.0.0.1"
        - "10.244.0.0/16"
        - "172.17.0.0/16"
    clusters:
      - name: analytics
        layout:
          shardsCount: 1
          replicasCount: 1
    settings:
      default/max_memory_usage: "4000000000"
