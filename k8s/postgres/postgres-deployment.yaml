apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: data-sources
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: data-sources
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
            - name: POSTGRES_DB
              value: postgres
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          args:
            # Logical replication for Debezium CDC (no custom config file needed)
            - -c
            - wal_level=logical
            - -c
            - max_wal_senders=4
            - -c
            - max_replication_slots=4
      volumes:
        - name: data
          emptyDir: {}   # Use emptyDir so Postgres starts on Kind without PVC; for persistence use postgres-pvc.yaml
